services:
  postgres:
    image: postgres:16
    container_name: eda_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eda
      POSTGRES_PASSWORD: eda
      POSTGRES_DB: eda_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: eda_backend
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://eda:eda@postgres:5432/eda_manager?schema=public}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-localhost}
      NODE_ENV: ${NODE_ENV:-development}
      WP_LOGIN_URL: ${WP_LOGIN_URL:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:4200}
      BACKEND_PORT: 5050
    ports:
      - "5050:5050"
    command: >
      sh -c "npm --workspace @eda/backend run prisma:deploy &&
             npm --workspace @eda/backend run prisma:generate &&
             npm --workspace @eda/backend run start:dev"

  frontend:
    image: node:20-alpine
    container_name: eda_frontend
    working_dir: /workspace
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./:/workspace
    environment:
      NODE_ENV: development
    ports:
      - "4200:4200"
    command: sh -c "npm install && npm --workspace @eda/frontend run start"

  frontend-prod:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: eda_frontend_prod
    profiles: ["prod"]
    depends_on:
      - backend
    ports:
      - "8088:80"

volumes:
  postgres_data:
