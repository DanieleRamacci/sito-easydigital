{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <div>
    <h1>Clienti</h1>
  </div>
  <div class="header-actions">
    <a href="/gestionale/fic/importa-clienti" class="btn btn-sm btn-outline">Importa clienti da FIC</a>
    <a href="/gestionale/clienti/nuovo" class="btn btn-sm">+ Nuovo cliente</a>
  </div>
</div>
<form class="filters" hx-get="/gestionale/clienti/table" hx-target="#customers-table" hx-trigger="keyup changed delay:300ms from:input, change from:select">
  <input type="text" name="q" placeholder="Cerca azienda, email, telefono" value="{{ q }}" />
  <select name="status">
    <option value="">Tutti gli stati</option>
    <option value="lead" {% if status=='lead' %}selected{% endif %}>Lead</option>
    <option value="invited" {% if status=='invited' %}selected{% endif %}>Invited</option>
    <option value="active" {% if status=='active' %}selected{% endif %}>Active</option>
  </select>
</form>
<div id="customers-table" class="card">{% include "partials/customers_table.html" %}</div>
{% endblock %}
