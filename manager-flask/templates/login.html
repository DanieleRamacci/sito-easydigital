<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Accesso — {{ title }}</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body class="login-body">
    <div class="login-card">
      <div class="brand" style="font-size:1.4rem;font-weight:700;color:#14532d;margin-bottom:8px;">EDA Manager</div>
      <h1 style="font-size:1.3rem;margin:0 0 20px;">Accedi al gestionale</h1>

      {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
      {% endif %}

      {% if request.args.get('setup') == 'ok' %}
      <div class="alert alert-success">Account creato. Accedi con le tue credenziali.</div>
      {% endif %}

      <form method="POST" action="/gestionale/login">
        <input type="hidden" name="next" value="{{ next }}" />
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required autofocus placeholder="admin@esempio.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-full">Accedi</button>
      </form>

      {% if not has_admin %}
      <p class="muted" style="margin-top:14px;font-size:.9rem;">
        Prima volta? <a href="/gestionale/setup">Crea il tuo account admin</a>
      </p>
      {% endif %}
    </div>
  </body>
</html>
