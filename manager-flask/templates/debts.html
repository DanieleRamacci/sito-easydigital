{% extends "base.html" %}
{% block content %}
<h1>Debiti</h1>
<form class="filters" hx-get="/gestionale/debiti/table" hx-target="#debts-table" hx-trigger="keyup changed delay:300ms from:input, change from:select">
  <input type="text" name="q" placeholder="Cerca cliente o voce" value="{{ q }}" />
  <select name="payment">
    <option value="">Tutti</option>
    <option value="pending" {% if payment=='pending' %}selected{% endif %}>In attesa</option>
    <option value="paid" {% if payment=='paid' %}selected{% endif %}>Pagato</option>
  </select>
</form>
<div id="debts-table" class="card">{% include "partials/debts_table.html" %}</div>
{% endblock %}
