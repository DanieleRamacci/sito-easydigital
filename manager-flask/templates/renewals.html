{% extends "base.html" %}
{% block content %}
<div class="section-header">
  <h1>Rinnovi in scadenza</h1>
  <div style="display:flex;gap:8px;align-items:center;">
    <form hx-get="/gestionale/rinnovi/table" hx-target="#renewals-table" hx-trigger="change from:select" style="margin:0">
      <select name="months">
        <option value="1" {% if months==1 %}selected{% endif %}>Prossimo mese</option>
        <option value="2" {% if months==2 %}selected{% endif %}>2 mesi</option>
        <option value="3" {% if months==3 %}selected{% endif %}>3 mesi</option>
        <option value="6" {% if months==6 %}selected{% endif %}>6 mesi</option>
        <option value="12" {% if months==12 %}selected{% endif %}>12 mesi</option>
      </select>
    </form>
    <button class="btn btn-sm"
      hx-post="/gestionale/rinnovi/processa"
      hx-target="#process-result"
      hx-swap="innerHTML"
      hx-confirm="Generare i DebtItem per tutti i rinnovi scaduti oggi?">
      Processa rinnovi scaduti
    </button>
  </div>
</div>

<div id="process-result"></div>

<div id="renewals-table" class="card">
  {% include "partials/renewals_table.html" %}
</div>
{% endblock %}
